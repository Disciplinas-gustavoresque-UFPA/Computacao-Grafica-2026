<!doctype html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Editor Vetorial — Computação Gráfica 2026</title>
        <link rel="stylesheet" href="css/style.css" />
    </head>

    <body>
        <div id="tela-inicial">
            <h1>Editor Vetorial 2026</h1>
            <nav class="menu-opcoes">
                <button id="btn-novo-doc" class="btn-menu">Criar novo documento</button>

                <div class="grupo-opcao">
                    <label for+"select-tamanho" class"propriedade-label">Tamanho da página:</label>
                    <div class="select-wrapper">
                        <select id="select-tamanho" class="select-format">
                            <option value="livre" selected>Livre</option>
                            <option value="a4">A4 (800x1131)</option>
                            <option value="a3">A3 (1131x1600)</option>
                        </select>
                        <svg class="select-arrow" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                            <path d="M7 10l5 5 5-5z" />
                        </svg>
                    </div>
                </div>

                <button id="btn-abrir-arq" class="btn-menu">Abrir arquivo</button>
                <button id="btn-modelos" class="btn-menu">Modelos (templates)</button>
                <button id="btn-config" class="btn-menu">Configurações</button>
            </nav>
        </div>
        <div id="app" class="oculto">
            <!-- Painel Superior: propriedades (cor de preenchimento, cor de borda, etc.) -->
            <header id="painel-propriedades">
                <span class="propriedade-label">Preenchimento:</span>
                <input
                    type="color"
                    id="cor-preenchimento"
                    value="#4a90d9"
                    title="Cor de preenchimento"
                />

                <span class="propriedade-label">Borda:</span>
                <input
                    type="color"
                    id="cor-borda"
                    value="#1a1a2e"
                    title="Cor da borda"
                />

                <span id="ferramenta-atual-label"
                    >Ferramenta:
                    <strong id="nome-ferramenta">Nenhuma</strong></span
                >
                <!-- Botão de exportar/descarregar desenho -->
                <label for="export-format" class="propriedade-label"
                    >Exportar:</label
                >
                <div class="select-wrapper">
                    <select
                        class="select-format"
                        id="export-format"
                        title="Formato de exportação"
                    >
                        <option value="png" selected>PNG</option>
                        <option value="jpg">JPG</option>
                        <option value="svg">SVG</option>
                    </select>

                    <svg
                        class="select-arrow"
                        viewBox="0 0 24 24"
                        aria-hidden="true"
                        focusable="false"
                    >
                        <path d="M7 10l5 5 5-5z" />
                    </svg>
                </div>
                <button
                    class="btn-exportar"
                    id="btn-exportar"
                    title="Salvar/Exportar desenho"
                >
                    Baixar 💾
                </button>
            </header>

            <div id="workspace">
                <!-- Barra Lateral: botões das ferramentas de desenho -->
                <aside id="barra-ferramentas">
                    <button
                        class="btn-ferramenta"
                        data-ferramenta="selecao"
                        title="Seleção (S)"
                    >
                        &#9654;
                    </button>
                    <button
                        class="btn-ferramenta"
                        data-ferramenta="retangulo"
                        title="Retângulo (R)"
                    >
                        &#9645;
                    </button>
                    <button
                        class="btn-ferramenta"
                        data-ferramenta="elipse"
                        title="Elipse (E)"
                    >
                        &#9711;
                    </button>
                    <button
                        class="btn-ferramenta"
                        data-ferramenta="linha"
                        title="Linha (L)"
                    >
                        &#9135;
                    </button>
                    <button
                        class="btn-ferramenta"
                        data-ferramenta="texto"
                        title="Texto (T)"
                    >
                        T
                    </button>
                    <button
                        class="btn-ferramenta"
                        data-ferramenta="Conta-gotas"
                        title="Conta-gotas"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="24"
                            height="24"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            class="lucide lucide-pipette-icon lucide-pipette"
                        >
                            <path
                                d="m12 9-8.414 8.414A2 2 0 0 0 3 18.828v1.344a2 2 0 0 1-.586 1.414A2 2 0 0 1 3.828 21h1.344a2 2 0 0 0 1.414-.586L15 12"
                            />
                            <path
                                d="m18 9 .4.4a1 1 0 1 1-3 3l-3.8-3.8a1 1 0 1 1 3-3l.4.4 3.4-3.4a1 1 0 1 1 3 3z"
                            />
                            <path d="m2 22 .414-.414" />
                        </svg>
                    </button>
                </aside>

                <!-- Área Central de Desenho -->
                <main id="area-desenho">
                    <svg
                        id="canvas"
                        xmlns="http://www.w3.org/2000/svg"
                        width="100%"
                        height="100%"
                        aria-label="Área de desenho vetorial"
                    >
                        <!-- Os elementos SVG criados pelo usuário serão inseridos aqui -->
                    </svg>
                </main>
            </div>
            <!-- /#workspace -->
        </div>
        <!-- /#app -->

        <!-- Ponto de entrada da aplicação: ES6 Module -->
        <script type="module" src="js/main.js"></script>
    </body>
</html>
